x-app-server: &app-server
  build: .
  environment:
    DATABASE_HOST: postgres
    DATABASE_NAME: hackathon_db
    DATABASE_PORT: "5432"
    DATABASE_USER: postgres
    DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
    FLASK_DEBUG: "false"
    REDIS_URL: redis://redis:6379
  secrets:
    - postgres_password
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  expose:
    - "8000"
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
      ]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s
  restart: unless-stopped

services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  server-1:
    <<: *app-server

  server-2:
    <<: *app-server

  server-3:
    <<: *app-server

  server-4:
    <<: *app-server

  nginx:
    image: nginx:1.29.7-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
      server-4:
        condition: service_healthy
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  postgres-data:
  redis-data:
